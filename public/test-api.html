<!DOCTYPE html>
<html>
<head>
    <title>Test Suite API Tester</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 8px 16px; margin: 5px; background: #007cba; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005a87; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        textarea { width: 100%; height: 200px; font-family: monospace; }
        input { padding: 6px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Suite API Tester</h1>
        
        <div class="section">
            <h3>1. Test Draft API</h3>
            <input type="text" id="issueKey" placeholder="Issue Key (e.g. PROJ-123)" value="TEST-123">
            <input type="text" id="summary" placeholder="Summary" value="User login functionality">
            <button onclick="testDraft()">Test Draft API</button>
            <div id="draftResult"></div>
        </div>

        <div class="section">
            <h3>2. Test Suite API</h3>
            <button onclick="testSuite()">Test Suite API</button>
            <div id="suiteResult"></div>
        </div>

        <div class="section">
            <h3>3. Test Case API</h3>
            <input type="text" id="suiteId" placeholder="Suite ID (from above)">
            <button onclick="testCase()">Test Case API</button>
            <div id="caseResult"></div>
        </div>

        <div class="section">
            <h3>API Responses</h3>
            <textarea id="output" readonly></textarea>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function log(message) {
            output.value += new Date().toLocaleTimeString() + ': ' + message + '\n';
            output.scrollTop = output.scrollHeight;
        }

        async function testDraft() {
            try {
                log('Testing Draft API...');
                const response = await fetch('/api/generator/draft', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        issueKey: document.getElementById('issueKey').value || 'TEST-123',
                        summary: document.getElementById('summary').value || 'User login functionality',
                        description: 'Allow users to log in with email and password',
                        acceptanceCriteria: 'User should be able to enter credentials and access the system'
                    })
                });

                const data = await response.json();
                log('Draft API Response: ' + JSON.stringify(data, null, 2));
                
                if (data.suiteId) {
                    document.getElementById('suiteId').value = data.suiteId;
                    document.getElementById('draftResult').innerHTML = '<span class="success">✓ Draft created with ' + (data.testCases?.length || 0) + ' test cases</span>';
                } else {
                    document.getElementById('draftResult').innerHTML = '<span class="error">✗ ' + (data.error || 'Failed to create draft') + '</span>';
                }
            } catch (error) {
                log('Draft API Error: ' + error.message);
                document.getElementById('draftResult').innerHTML = '<span class="error">✗ ' + error.message + '</span>';
            }
        }

        async function testSuite() {
            try {
                log('Testing Suite API...');
                const response = await fetch('/api/generator/suite', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        issueKey: document.getElementById('issueKey').value || 'TEST-123'
                    })
                });

                const data = await response.json();
                log('Suite API Response: ' + JSON.stringify(data, null, 2));
                
                if (data.id) {
                    document.getElementById('suiteId').value = data.id;
                    document.getElementById('suiteResult').innerHTML = '<span class="success">✓ Suite loaded/created: ' + data.id + '</span>';
                } else {
                    document.getElementById('suiteResult').innerHTML = '<span class="error">✗ ' + (data.error || 'Failed to create suite') + '</span>';
                }
            } catch (error) {
                log('Suite API Error: ' + error.message);
                document.getElementById('suiteResult').innerHTML = '<span class="error">✗ ' + error.message + '</span>';
            }
        }

        async function testCase() {
            const suiteId = document.getElementById('suiteId').value;
            if (!suiteId) {
                alert('Please run Suite API test first to get a suite ID');
                return;
            }

            try {
                log('Testing Case API...');
                const response = await fetch('/api/generator/case', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        suiteId: suiteId,
                        title: 'Manual Test Case',
                        description: 'Test case created via API',
                        steps: ['Step 1: Navigate to login', 'Step 2: Enter credentials', 'Step 3: Click submit'],
                        expectedResult: 'User should be logged in successfully',
                        priority: 'High'
                    })
                });

                const data = await response.json();
                log('Case API Response: ' + JSON.stringify(data, null, 2));
                
                if (data.id) {
                    document.getElementById('caseResult').innerHTML = '<span class="success">✓ Test case created: ' + data.id + '</span>';
                } else {
                    document.getElementById('caseResult').innerHTML = '<span class="error">✗ ' + (data.error || 'Failed to create test case') + '</span>';
                }
            } catch (error) {
                log('Case API Error: ' + error.message);
                document.getElementById('caseResult').innerHTML = '<span class="error">✗ ' + error.message + '</span>';
            }
        }

        // Initialize
        log('API Tester Ready. Click buttons to test endpoints.');
    </script>
</body>
</html>
